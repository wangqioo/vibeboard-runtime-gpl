<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DevTools</title>
  <style>
    :root{color-scheme:light}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#f6f8fb;color:#1f2937;line-height:1.6}
    main{max-width:720px;margin:0 auto;padding:32px 20px 48px}
    .hero{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(31,41,55,.06)}
    h1{margin:0 0 8px;font-size:30px;letter-spacing:0}
    p{margin:0}
    .summary{color:#4b5563;font-size:16px}
    .meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:20px}
    .item{background:#f9fafb;border:1px solid #edf0f3;border-radius:12px;padding:12px}
    .label{display:block;color:#6b7280;font-size:12px}
    .value{font-weight:600}
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>DevTools</h1>
      <p class="summary">开发辅助服务，提供本地调试、文件查看和临时运行工具。</p>
      <div class="meta">
        <div class="item"><span class="label">App ID</span><span class="value">devtools</span></div>
        <div class="item"><span class="label">入口</span><span class="value">main.lua</span></div>
        <div class="item"><span class="label">类型</span><span class="value">Service / WebUI</span></div>
      </div>
    </section>
  </main>
</body>
</html>
